<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SITTA UT</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Side - White Background with Image and Logo -->
        <div class="left-side">
            <img src="img/logo-sitta-ut.png" alt="SITTA UT Logo" class="logo">
        </div>

        <!-- Right Side - Blue Background with Login Form -->
        <div class="right-side">
            <h2>Selamat Datang</h2>
            <p class="description">Masuk untuk melanjutkan ke aplikasi SITTA UT</p>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Masuk</button>
            </form>
            <!-- Alert box will be placed here, below the form -->
            <div id="login-alert" class="alert">
                <span id="alert-message"></span>
            </div>
            <div class="additional-links">
                <button id="forgot-password" onclick="showModal('forgot-password-modal')">Lupa password?</button>
                <button id="register" onclick="showModal('register-modal')">Belum punya akun? Daftar</button>
            </div>
        </div>
    </div>

    <!-- Modal for Lupa Password -->
    <div id="forgot-password-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('forgot-password-modal')">&times;</span>
            <h3>Lupa Password</h3>
            <p>Masukkan email untuk reset password.</p>
            <input type="email" placeholder="Email" id="reset-email">
            <button onclick="resetPassword()">Kirim</button>
        </div>
    </div>

    <!-- Modal for Daftar Akun Baru -->
    <div id="register-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('register-modal')">&times;</span>
            <h3>Daftar Akun Baru</h3>
            <form id="register-form">
                <input type="text" placeholder="Nama Lengkap" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="NIP" required>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Re-Password" required>
                <button type="submit">Daftar</button>
            </form>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>

</html>
